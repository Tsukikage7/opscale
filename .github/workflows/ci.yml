name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.0.6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.13
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify
